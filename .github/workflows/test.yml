name: Tests

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Run tests
        run: yarn test
        env:
          NODE_ENV: test
          # Skip the 900 ms minimum response delay in CI to keep the suite fast.
          AUTH_MIN_RESPONSE_MS: 0
